name: release

# Build the manylinux x86_64 wheel (with bundled mgba_libretro.so +
# fceumm_libretro.so) + sdist on every published GitHub release,
# then publish both to PyPI
# via trusted publishing (OIDC). No tokens stored anywhere — the
# publish job requests a short-lived token from PyPI using GitHub's
# identity claim.
#
# Trusted publisher must be configured on PyPI first:
#   https://pypi.org/manage/project/retrokix/settings/publishing/
#   (or as a "pending publisher" before the project exists)
# with:
#   Owner: apiad
#   Repo:  retrokix
#   Workflow filename: release.yml
#   Environment name: pypi

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-24.04
    container: quay.io/pypa/manylinux_2_28_x86_64
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        run: yum install -y cmake gcc-c++ make git

      - name: Build mgba_libretro.so + stage into wheel
        run: bin/build-core

      - name: Build fceumm_libretro.so + stage into wheel
        run: bin/build-fceumm-core

      - name: Build wheel + sdist
        run: |
          /opt/python/cp311-cp311/bin/pip install --upgrade pip build auditwheel
          /opt/python/cp311-cp311/bin/python -m build --wheel
          /opt/python/cp311-cp311/bin/python -m build --sdist

      - name: Inspect wheel platform tag
        run: |
          ls -la dist/
          /opt/python/cp311-cp311/bin/auditwheel show dist/retrokix-*.whl

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-24.04
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
