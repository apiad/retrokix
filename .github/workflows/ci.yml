name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: System deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libsdl2-dev libpng-dev libsqlite3-dev cmake build-essential

      - name: Build mgba_libretro.so
        run: |
          bin/build-core
          # CI tests historically read tests/cores/mgba_libretro.so via the
          # `mgba_core` conftest fixture; mirror the bundled artifact there
          # so existing tests keep finding it.
          cp src/gbax/cores/mgba_libretro.so tests/cores/mgba_libretro.so

      - name: Build fceumm_libretro.so
        run: bin/build-fceumm-core

      - name: Install gbax + dev deps
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check src tests

      - name: Test
        run: pytest -v
        env:
          SDL_VIDEODRIVER: dummy
