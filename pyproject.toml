[project]
name = "gbax"
version = "0.0.1"
description = "Hacker-first, scriptable GBA emulator with HTTP API"
readme = "README.md"
license = { text = "MPL-2.0" }
requires-python = ">=3.11"
authors = [{ name = "Alejandro Piad" }]
dependencies = [
  "typer>=0.12",
  "fastapi>=0.110",
  "uvicorn>=0.29",
  "numpy>=1.26",
  "pillow>=10",
  "pysdl2>=0.9.16",
  "pysdl2-dll>=2.30",
  # libmgba binding pinned in Task 2 once verified
]

[project.scripts]
gbax = "gbax.cli:app"

[project.optional-dependencies]
dev = [
  "pytest>=8",
  "pytest-asyncio>=0.23",
  "httpx>=0.27",
  "ruff>=0.4",
  "mypy>=1.10",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/gbax"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
