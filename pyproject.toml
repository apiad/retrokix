[project]
name = "gbax"
version = "0.2.0"
description = "Hacker-first, scriptable GBA emulator with HTTP API"
readme = "README.md"
license = { text = "MPL-2.0" }
requires-python = ">=3.11"
authors = [{ name = "Alejandro Piad" }]
keywords = ["gba", "emulator", "libretro", "mgba", "fastapi", "cli", "gameboy"]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Environment :: Console",
  "Environment :: X11 Applications",
  "Intended Audience :: Developers",
  "Intended Audience :: End Users/Desktop",
  "License :: OSI Approved :: Mozilla Public License 2.0 (MPL 2.0)",
  "Operating System :: POSIX :: Linux",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3 :: Only",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Topic :: Games/Entertainment",
  "Topic :: System :: Emulators",
]
dependencies = [
  "typer>=0.12",
  "fastapi>=0.110",
  "uvicorn>=0.29",
  "numpy>=1.26",
  "pillow>=10",
  "pysdl2>=0.9.16",
  "pysdl2-dll>=2.30",
  "cffi>=1.17",  # used by gbax.libretro to bind the libretro ABI
]

[project.urls]
Homepage = "https://github.com/apiad/gbax"
Source = "https://github.com/apiad/gbax"
Issues = "https://github.com/apiad/gbax/issues"

[project.scripts]
gbax = "gbax.cli:app"

[project.optional-dependencies]
dev = [
  "pytest>=8",
  "pytest-asyncio>=0.23",
  "httpx>=0.27",
  "ruff>=0.4",
  "mypy>=1.10",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/gbax"]

[tool.hatch.build.targets.wheel.force-include]
"src/gbax/data/no_intro_gba.json" = "gbax/data/no_intro_gba.json"
"src/gbax/data/libretro_cheats_gba.json" = "gbax/data/libretro_cheats_gba.json"
"src/gbax/data/bots/__init__.py" = "gbax/data/bots/__init__.py"
"src/gbax/data/bots/press_a.py" = "gbax/data/bots/press_a.py"
"src/gbax/data/bots/random.py" = "gbax/data/bots/random.py"
"src/gbax/data/scenarios/__init__.py" = "gbax/data/scenarios/__init__.py"
"src/gbax/data/scenarios/mk_arcade_easy.py" = "gbax/data/scenarios/mk_arcade_easy.py"
"src/gbax/data/scenarios/smb3_world_1_1.py" = "gbax/data/scenarios/smb3_world_1_1.py"

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
